---
- name: Install tone9 host packages on Debian-family systems
  ansible.builtin.apt:
    name: "{{ tone9_host_packages }}"
    state: present
    update_cache: false
  when: ansible_os_family == "Debian"

- name: Ensure tone9 group exists
  ansible.builtin.group:
    name: "{{ tone9_runtime_group }}"
    system: true

- name: Ensure tone9 runtime user exists
  ansible.builtin.user:
    name: "{{ tone9_runtime_user }}"
    group: "{{ tone9_runtime_group }}"
    home: "{{ tone9_runtime_home }}"
    create_home: true
    system: true
    shell: /usr/sbin/nologin

- name: Check tone9 subordinate UID range
  ansible.builtin.command:
    cmd: "grep -E '^{{ tone9_runtime_user }}:' /etc/subuid"
  register: tone9_subuid_entry
  changed_when: false
  failed_when: false

- name: Check tone9 subordinate GID range
  ansible.builtin.command:
    cmd: "grep -E '^{{ tone9_runtime_user }}:' /etc/subgid"
  register: tone9_subgid_entry
  changed_when: false
  failed_when: false

- name: Ensure tone9 subordinate UID/GID ranges exist
  ansible.builtin.command:
    cmd: >-
      usermod
      --add-subuids {{ tone9_subuid_start }}-{{ tone9_subuid_start + tone9_subuid_count - 1 }}
      --add-subgids {{ tone9_subgid_start }}-{{ tone9_subgid_start + tone9_subgid_count - 1 }}
      {{ tone9_runtime_user }}
  changed_when: true
  when:
    - tone9_subuid_entry.rc != 0 or tone9_subgid_entry.rc != 0

- name: Ensure tone9 runtime directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ tone9_runtime_user }}"
    group: "{{ tone9_runtime_group }}"
    mode: "0755"
  loop:
    - "{{ tone9_state_root }}"
    - "{{ tone9_runtime_home }}"
    - "{{ tone9_current_dir }}"
    - "{{ tone9_output_dir }}"
    - "{{ tone9_data_dir }}"
    - "{{ tone9_current_dir }}/metrics"
    - "{{ tone9_data_dir }}/cache"
    - "{{ tone9_data_dir }}/libreoffice-profile"
    - "{{ tone9_runtime_home }}/.config/containers/systemd"

- name: Check linger state for tone9 user
  ansible.builtin.command: "loginctl show-user {{ tone9_runtime_user }} --property=Linger --value"
  register: tone9_linger
  changed_when: false
  failed_when: false

- name: Enable linger for tone9 user
  ansible.builtin.command: "loginctl enable-linger {{ tone9_runtime_user }}"
  changed_when: true
  when: tone9_linger.stdout | default('no') != 'yes'
